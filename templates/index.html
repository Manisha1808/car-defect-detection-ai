<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Defect Detector</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background-color: #2a5298;
            color: white;
            border-radius: 30px;
            padding: 10px 25px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #1e3c72;
            transform: scale(1.05);
        }

        .image-box {
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.15);
            margin-top: 15px;
        }

        .title {
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card bg-white">

        <h2 class="title">🚗 Car Defect Detection System</h2>

        <form method="POST" enctype="multipart/form-data" class="text-center">
            <input class="form-control mb-3" type="file" name="image" required>
            <button class="btn btn-custom" type="submit">Predict</button>
        </form>

        {% if uploaded_image %}
        <div class="row mt-4">
            <div class="col-md-6 text-center">
                <h5>Uploaded Image</h5>
                <img src="{{ uploaded_image }}" class="img-fluid image-box">
            </div>

            <div class="col-md-6 text-center">
                <h5>Prediction Result</h5>
                <img src="{{ predicted_image }}" class="img-fluid image-box">
            </div>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
